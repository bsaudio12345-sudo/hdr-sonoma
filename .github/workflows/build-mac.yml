name: Build macOS M1 App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests pyinstaller

      - name: Build App Bundle
        run: |
          pyinstaller --noconsole --clean \
            --name="BroadcastControlPanel" \
            --icon="logo.icns" \
            --add-data "fa9520_devices.json:." \
            --add-data "logo.ico:." \
            main.py

      - name: Compress and Upload
        run: |
          cd dist
          zip -r BroadcastControlPanel_M1.zip BroadcastControlPanel.app
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BroadcastControlPanel-M1
          path: dist/BroadcastControlPanel_M1.zip
